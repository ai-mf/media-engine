# .github/workflows/verify-assets.yml
name: Verify AI Assets
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all AIMF files
        run: |
          cargo run --bin aimf -- batch \
            --input "assets/*.aimg" \
            --verify \
            --parallel


