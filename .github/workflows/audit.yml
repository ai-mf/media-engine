name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday
  push:
    paths: ['**/Cargo.lock']
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}