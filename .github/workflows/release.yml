name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: aimf-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: aimf-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: aimf-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: aimf-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: aimf-windows-x86_64.exe

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true
    
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }} --bin aimf
    
    - name: Strip symbols (Unix)
      if: matrix.os != 'windows-latest'
      run: strip target/${{ matrix.target }}/release/aimf
    
    - name: Rename binary
      run: mv target/${{ matrix.target }}/release/aimf${{ matrix.extension }} ${{ matrix.artifact_name }}
      shell: bash
    
    - name: Upload to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}
        asset_name: ${{ matrix.artifact_name }}
        asset_content_type: application/octet-stream