# Pre-commit hooks for AIMF
# Install: pip install pre-commit && pre-commit install
# Run: pre-commit run --all-files

repos:
  # Rust hooks
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [commit]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [commit]

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [commit]
        verbose: true

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        files: \.md$
        stages: [commit]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        stages: [commit]

  # JSON linting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
        files: \.json$
        stages: [commit]

  # TOML linting
      - id: check-toml
        files: \.toml$
        stages: [commit]

  # Trailing whitespace
      - id: trailing-whitespace
        stages: [commit]

  # End of file fixer
      - id: end-of-file-fixer
        stages: [commit]

  # Check for large files
      - id: check-added-large-files
        args: ["--maxkb=1000"]
        stages: [commit]

  # Check for merge conflicts
      - id: check-merge-conflict
        stages: [commit]

  # Forbid private keys in commits
  - repo: local
    hooks:
      - id: forbid-private-keys
        name: forbid private keys
        entry: ".*\\.key$|.*\\.pem$|.*\\.priv$|private\\.key"
        language: py_always_fail
        files: \.(key|pem|priv)$
        stages: [commit]

  # Security audit
      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        files: Cargo\.lock$
        pass_filenames: false
        stages: [commit]